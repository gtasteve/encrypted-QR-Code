<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Krux QR‑code Decryptor (offline)</title>
<style>
    body {font-family:Arial,Helvetica,sans-serif; max-width:800px; margin:2rem auto; line-height:1.5;}
    textarea, input {width:100%; box-sizing:border-box; margin-top:0.5rem;}
    button {margin-top:1rem; padding:0.5rem 1rem; font-size:1rem;}
    #output {white-space:pre-wrap; background:#f8f8f8; padding:1rem; margin-top:1rem; border:1px solid #ccc;}
    .error {color:#c00;}
</style>
</head>
<body>

<h1>Krux QR‑code Decryptor</h1>

<p>
    Paste the **ASCII text** that you saved from the encrypted QR‑code, then enter the password you used when the QR‑code was created.
</p>

<label for="enc">Encrypted QR‑code (ASCII / Base64)</label>
<textarea id="enc" rows="6" placeholder="e.g. U2FsdGVkX1+..."></textarea>

<label for="pwd">Password</label>
<input type="password" id="pwd" placeholder="your password">

<button id="decryptBtn">Decrypt</button>

<div id="output"></div>
